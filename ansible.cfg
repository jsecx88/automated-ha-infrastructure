# ansible.cfg — Ansible reads this file automatically when you run any
# ansible-playbook command from the project directory.
# It sets defaults so you don't have to pass flags on every command.

[defaults]
# Where to find the inventory (list of machines)
inventory = inventory/hosts.ini

# Where to find reusable roles (haproxy, nginx)
roles_path = roles

# How many machines to configure at the same time
# 5 is a safe default for a small lab
forks = 5

# Don't create .retry files when a playbook fails
# (they're not useful for a lab and just clutter the directory)
retry_files_enabled = False

# Show a timing summary at the end of each playbook run
# Useful for spotting which tasks are slow
callback_whitelist = timer, profile_tasks

[ssh_connection]
# Reuse SSH connections instead of opening a new one per task
# Makes playbooks run noticeably faster
pipelining = True
