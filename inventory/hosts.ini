# hosts.ini — the inventory file.
# Ansible reads this to know what machines exist and how to reach them.
# Machines are grouped so playbooks can target "all web servers" as a unit
# instead of listing each one individually.

# --- Load Balancer ---
[loadbalancers]
lb01 ansible_host=192.168.56.10

# --- Web Nodes ---
[webservers]
web01 ansible_host=192.168.56.11
web02 ansible_host=192.168.56.12
web03 ansible_host=192.168.56.13

# --- Variables that apply to every machine ---
[all:vars]
# Vagrant creates a 'vagrant' user on every VM with sudo access
ansible_user=vagrant

# Each VM gets its own SSH key generated by Vagrant during `vagrant up`
# This path pattern works for all four machines
ansible_ssh_private_key_file=.vagrant/machines/%(inventory_hostname)s/libvirt/private_key

# Why: In a lab we destroy and recreate VMs often. SSH would normally warn
# about changed host fingerprints each time. This silences that warning.
# Never use this on real production servers.
ansible_ssh_common_args='-o StrictHostKeyChecking=no'
